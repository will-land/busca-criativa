<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO: Atualizar em /gerar-copy -->
  <title>Titulo da Pagina</title>
  <meta name="description" content="Descricao para SEO">

  <!-- Open Graph: Atualizar em /gerar-copy -->
  <meta property="og:title" content="Titulo da Pagina">
  <meta property="og:description" content="Descricao para SEO">
  <meta property="og:type" content="website">
  <meta property="og:image" content="">
  <meta property="og:url" content="">

  <!-- Favicon: Adicionar em /desenvolver -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- FONTS: Substituir em /gerar-design (NUNCA usar fontes overused) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">

  <!-- intl-tel-input -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@24.6.0/build/css/intlTelInput.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!--
    ESTRUTURA DA PAGINA
    ===================
    Gerada por /gerar-layout e construida por /desenvolver

    REGRAS:
    - Cada secao deve ter arquetipo + constraints unicos
    - NUNCA repetir padroes entre secoes consecutivas
    - NUNCA usar: hero centralizado generico, 3 cards, grid simetrico
    - Manter font pairing consistente em toda pagina
  -->

  <!-- Header Simples -->
  <header class="header">
    <div class="container text-center">
      <h1 class="hero-title">Busca Criativa</h1>
      <p class="hero-subtitle">Encontre imagens stock gratuitas e referências de design em um só lugar.</p>
    </div>
  </header>

  <main class="main-content container">
    <!-- Area de Busca -->
    <section class="search-section">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar por termo (ex: design, natureza)..."
          class="search-input" autocomplete="off">
        <button id="searchBtn" class="btn btn-primary search-btn">
          <span class="btn-text">Buscar</span>
          <span class="loader hidden"></span>
        </button>
      </div>
    </section>

    <!-- Sistema de Tabs -->
    <section class="tabs-section">
      <div class="tabs-nav">
        <button class="tab-btn active" data-tab="images">Imagens (Stock)</button>
        <button class="tab-btn" data-tab="references">Referências (Design)</button>
      </div>

      <!-- Content Area -->
      <div class="tab-content" id="resultsContainer">
        <!-- O Content Grid entra aqui via JS -->
        <div class="empty-state">
          <p>Digite um termo acima e clique em buscar.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer mt-auto">
    <div class="container text-center">
      <p>&copy; <span id="year"></span> Busca Criativa. Desenvolvido Willdesigner.</p>
    </div>
  </footer>

  <!-- Remover AOS e scripts nao usados para este projeto focado em performance simples, mantendo soh nosso script -->
  <script src="script.js"></script>
</body>

</html>
